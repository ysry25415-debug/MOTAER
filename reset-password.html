<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | WebDev Freelance Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="auth-pages.css" />
  </head>
  <body data-page="reset">
    <div class="auth-background auth-glow-one" aria-hidden="true"></div>
    <div class="auth-background auth-glow-two" aria-hidden="true"></div>

    <header class="auth-topbar">
      <a href="index.html" class="auth-brand">
        <span class="brand-dot"></span>
        <span>
          <strong>WebDev</strong>
          <small>Freelance Hub</small>
        </span>
      </a>
      <a href="login.html" class="ghost-link">Back to login</a>
    </header>

    <main class="auth-shell">
      <section class="auth-copy">
        <span class="eyebrow">Password recovery</span>
        <h1>Reset your password and continue working.</h1>
        <p>
          Enter your email to receive a secure reset link. After opening the link, set your
          new password and continue directly to login.
        </p>
      </section>

      <section class="auth-panel">
        <div class="panel-card">
          <div class="panel-head">
            <span class="eyebrow">Recovery</span>
            <h2>Reset password</h2>
          </div>

          <form id="resetRequestForm" class="auth-form">
            <label class="full-span">
              <span>Email</span>
              <input type="email" name="email" placeholder="you@example.com" required />
            </label>
            <button type="submit" class="primary-button full-span">Send reset link</button>
          </form>

          <form id="resetUpdateForm" class="auth-form" hidden>
            <label class="full-span">
              <span>New password</span>
              <input type="password" name="password" placeholder="Minimum 8 characters" required />
            </label>
            <label class="full-span">
              <span>Confirm new password</span>
              <input type="password" name="confirm_password" placeholder="Repeat new password" required />
            </label>
            <button type="submit" class="primary-button full-span">Update password</button>
          </form>

          <div class="auth-status" id="authStatus" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="auth-pages.js"></script>
  </body>
</html>
